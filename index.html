<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grip&Rip Rebirth74</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary: #6366f1;
            --secondary: #10b981; 
            --accent: #fbbf24; 
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --red: #ef4444; 
            --green: #22c55e;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            margin: 0; 
            padding: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
        }

        .container { width: 100%; max-width: 1000px; margin: auto; }

        .logo-container { margin: 10px 10px 20px 10px; border-radius: 12px; overflow: hidden; }
        .logo-container img { width: 100%; height: auto; display: block; }

        .header-card { 
            background: var(--card-bg); 
            padding: 25px 15px; 
            margin: 0 10px 25px 10px;
            border-radius: 16px; 
            text-align: center; 
            border: 1px solid var(--border);
        }
        
        .header-card.is-major { 
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%); 
            border-bottom: 4px solid var(--accent);
        }

        .badge-area { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .event-badge { padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; display: none; }
        .is-major .major-tag { display: inline-block; background: var(--accent); color: #000; }
        .has-db .db-tag { display: inline-block; background: var(--secondary); color: #fff; }

        h2 { 
            font-size: 1rem; margin: 30px 15px 15px 15px; display: flex; align-items: center; 
            gap: 10px; text-transform: uppercase; color: var(--text-dim);
        }
        h3 { 
            background: rgba(255,255,255,0.05); padding: 12px 15px; margin: 0; 
            font-size: 0.9rem; color: var(--secondary); border-top: 1px solid var(--border);
        }

        .table-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            background: var(--card-bg); 
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
            -webkit-overflow-scrolling: touch;
        }

        table { 
            width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 480px; 
        }

        th { 
            background: rgba(15, 23, 42, 0.7); color: var(--text-dim); 
            padding: 12px 5px; font-size: 10px; text-transform: uppercase; 
            text-align: center; border-bottom: 1px solid var(--border);
        }

        td { 
            padding: 14px 5px; border-bottom: 1px solid var(--border); 
            text-align: center; font-size: 13px; font-weight: 500;
        }

        /* Column Widths */
        .col-pos { width: 40px; font-weight: 800; background: rgba(0,0,0,0.1); }
        .col-player { width: 130px; text-align: left !important; padding-left: 10px !important; }
        .col-data { width: 45px; }
        .col-pts { width: 60px; background: rgba(16, 185, 129, 0.1); color: var(--secondary); font-weight: 800; }

        .p-name-cell { display: flex; align-items: center; gap: 6px; white-space: nowrap; }

        .score-red { color: var(--red); font-weight: 800; }
        .score-green { color: var(--green); font-weight: 800; }

        .highlights-bar { 
            display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 15px; 
            background: rgba(0,0,0,0.3); margin-bottom: 30px; border-bottom: 1px solid var(--border);
        }
        .high-tag { 
            background: #0f172a; padding: 4px 8px; border-radius: 4px; 
            font-size: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 5px;
        }
        .high-tag.gold { border-color: var(--accent); color: var(--accent); }

        .st-card { margin-bottom: 25px; width: 100%; }
        .st-card h4 { margin: 0; padding: 12px 15px; background: #334155; font-size: 11px; text-transform: uppercase; }

        .hist-acc { border-bottom: 1px solid var(--border); }
        .hist-header { background: var(--card-bg); padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .hist-content { display: none; padding: 0; background: #0f172a; }
        .hist-content.active { display: block; }

        #backToTop { 
            position: fixed; bottom: 20px; right: 20px; width: 40px; height: 40px; 
            background: var(--primary); color: white; border: none; border-radius: 8px; 
            cursor: pointer; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><i class="fa-solid fa-arrow-up"></i></button>

<div class="container">
    <div class="logo-container"><img src="logo.png" alt="League Logo"></div>
	<div class="logo-container"><img src="season5.png" alt="Season5 Logo"></div>
    
    <div id="header" class="header-card">
        <div class="badge-area">
            <span class="event-badge major-tag">🏆 Major</span>
            <span class="event-badge db-tag">🔥 2X Points</span>
        </div>
        <h1 id="v-name" style="margin:0; font-size: 1.5rem;">Tournament</h1>
        <div style="margin-top:5px; font-size: 13px; color: var(--text-dim);">
            <span id="v-sw">Season -- Week --</span> • <span id="v-date">--</span>
        </div>
    </div>

    <h2><i class="fa-solid fa-trophy"></i> Leaderboards</h2>
    <div id="div-tables"></div>
	
	<div class="logo-container"><img src="sponsor.png" alt="Sponsor Logo"></div>

    <h2><i class="fa-solid fa-ranking-star"></i> Season Standings</h2>
    <div id="standings-area"></div>

    <div class="logo-container"><img src="2k25logo.png" alt="2K25 Logo"></div>

    <h2><i class="fa-solid fa-clock-rotate-left"></i> History</h2>
    <div id="history-area"></div>
</div>

<script>
    window.onscroll = () => { document.getElementById("backToTop").style.display = (window.scrollY > 400) ? "block" : "none"; };
    
    function getIcon(v) { 
        let c = v==="PS"?"#3b82f6":v==="Xbox"?"#22c55e":"#94a3b8";
        let i = v==="PS"?"playstation":v==="Xbox"?"xbox":"steam";
        return `<i class="fa-brands fa-${i}" style="color:${c};"></i>`; 
    }
    
    function parseToPar(v) { if(!v||v==="") return 999; let c = v.toString().toUpperCase(); return (c==='E'||c==='0')?0:parseInt(v); }
    function getScoreClass(v) { let n = parseToPar(v); if(n===999) return ""; return n<0?"score-red":(n===0?"score-green":""); }

    async function loadData() {
        try {
            const res = await fetch('data.json'); 
            const d = await res.json();
            document.getElementById('v-name').innerText = d.venue;
            if(d.isSig) document.getElementById('header').classList.add('is-major');
            if(d.doubleBonus) document.getElementById('header').classList.add('has-db');
            document.getElementById('v-sw').innerText = `Season ${d.seasonNum} Week ${d.weekNum}`;
            document.getElementById('v-date').innerText = d.date;

            // Leaderboards
            [1,2,3].forEach(dv => {
                const players = d.players.filter(p => p.division == dv).sort((a,b) => parseToPar(a.toPar)-parseToPar(b.toPar));
                let h = `<h3>Division ${dv}</h3><div class="table-wrapper"><table><thead><tr>
                    <th class="col-pos">POS</th>
                    <th class="col-player">Player</th>
                    <th class="col-data">Par</th>
                    <th class="col-data">Putt</th>
                    <th class="col-data">Shot</th>
                    <th class="col-data">Ace</th>
                    <th class="col-data">Alby</th>
                    <th class="col-pts">PTS</th>
                </tr></thead><tbody>`;
                
                let maxP={v:0,n:''}, maxS={v:0,n:''}, aces=[], albys=[];

                players.forEach(p => {
                    let s = parseToPar(p.toPar); 
                    let fI = players.findIndex(x => parseToPar(x.toPar) === s);
                    let pts = (p.toPar!=="" || p.putt!=="") ? calculate(p, fI, d.isSig, d.doubleBonus) : "--";
                    h += `<tr>
                        <td class="col-pos">${s===999?"--":fI+1}</td>
                        <td class="col-player"><div class="p-name-cell">${getIcon(p.console)} ${p.name}</div></td>
                        <td class="${getScoreClass(p.toPar)}">${p.toPar||'--'}</td>
                        <td>${p.putt||'--'}</td>
                        <td>${p.shot||'--'}</td>
                        <td>${p.ace||'--'}</td>
                        <td>${p.alby||'--'}</td>
                        <td class="col-pts">${pts}</td>
                    </tr>`;
                    let pVal = parseInt(p.putt) || 0, sVal = parseInt(p.shot) || 0;
                    if(pVal > maxP.v) maxP = {v:pVal, n:p.name};
                    if(sVal > maxS.v) maxS = {v:sVal, n:p.name};
                    if(p.ace && p.ace.trim() !== "") aces.push(p.name); 
                    if(p.alby && p.alby.trim() !== "") albys.push(p.name);
                });
                h += `</tbody></table></div>`;

                let hBar = `<div class="highlights-bar">`;
                if(maxP.v > 0) hBar += `<div class="high-tag"><span>🎯</span> <strong>Putt:</strong> ${maxP.n} (${maxP.v}ft)</div>`;
                if(maxS.v > 0) hBar += `<div class="high-tag"><span>🏌🏻</span> <strong>Shot:</strong> ${maxS.n} (${maxS.v}yds)</div>`;
                aces.forEach(n => hBar += `<div class="high-tag gold"><span>⛳</span> <strong>ACE:</strong> ${n}</div>`);
                albys.forEach(n => hBar += `<div class="high-tag gold"><span>🦅</span> <strong>ALBY:</strong> ${n}</div>`);
                hBar += `</div>`;

                document.getElementById('div-tables').innerHTML += h + ((maxP.v > 0 || maxS.v > 0 || aces.length > 0 || albys.length > 0) ? hBar : '<div style="margin-bottom:10px;"></div>');
            });

            // Standings with TIED logic (Total first, then ACC)
            const arch = d.season||{};
            [1,2,3].forEach(dv => {
                let h = `<div class="st-card"><h4>DIVISION ${dv}</h4><div class="table-wrapper"><table><thead><tr>
                    <th class="col-pos">POS</th>
                    <th class="col-player">Player</th>
                    <th class="col-data">Event</th>
                    <th class="col-data">Wins</th>
                    <th class="col-data">ACC</th>
                    <th class="col-pts">TOTAL</th>
                </tr></thead><tbody>`;
                let sp = d.players.filter(p => p.division == dv).map(p => ({
                    name:p.name, 
                    console:p.console, 
                    total:arch[p.name]?.points||0, 
                    ev:arch[p.name]?.eventsPlayed||0, 
                    wins:arch[p.name]?.wins||0, 
                    acc:arch[p.name]?.acc||'--'
                })).sort((a,b) => {
                    if (b.total !== a.total) return b.total - a.total; // Sort by points descending
                    return parseToPar(a.acc) - parseToPar(b.acc);     // Tie-breaker: Lower ACC score ascending
                });
                
                sp.forEach((p, i) => {
                    h += `<tr>
                        <td class="col-pos">${i+1}</td>
                        <td class="col-player"><div class="p-name-cell">${getIcon(p.console)} ${p.name}</div></td>
                        <td>${p.ev}</td>
                        <td>${p.wins}</td>
                        <td class="${getScoreClass(p.acc)}">${p.acc}</td>
                        <td class="col-pts">${p.total}</td>
                    </tr>`;
                });
                document.getElementById('standings-area').innerHTML += h + "</tbody></table></div></div>";
            });

            // History
            if(d.historyHtml) {
                const tempDiv = document.createElement('div'); tempDiv.innerHTML = d.historyHtml;
                tempDiv.querySelectorAll('.history-item').forEach(item => {
                    const title = item.querySelector('strong').innerText.replace(/S(\d+)\sW(\d+):/g, "S$1 W$2 •");
                    let table = item.querySelector('table');
                    let newTable = `<thead><tr><th class="col-player">Player</th><th class="col-data">Total</th><th class="col-pts">Points</th></tr></thead><tbody>`;
                    table.querySelectorAll('tr').forEach(tr => {
                        let cells = tr.querySelectorAll('td, th');
                        if(tr.innerText.includes("Division")) {
                            newTable += `<tr style="background:rgba(255,255,255,0.05);"><td colspan="3" style="text-align:left; font-size:10px; font-weight:bold; color:var(--secondary); padding-left:10px;">${tr.innerText.toUpperCase()}</td></tr>`;
                        } else if(cells.length === 3) {
                            let p = d.players.find(x => x.name === cells[0].innerText);
                            newTable += `<tr><td class="col-player"><div class="p-name-cell">${p ? getIcon(p.console) : ''} ${cells[0].innerText}</div></td><td class="${getScoreClass(cells[1].innerText)}">${cells[1].innerText}</td><td class="col-pts">${cells[2].innerText}</td></tr>`;
                        }
                    });
                    document.getElementById('history-area').innerHTML += `<div class="hist-acc"><div class="hist-header" onclick="this.nextElementSibling.classList.toggle('active')"><span>${title}</span><i class="fa-solid fa-chevron-down"></i></div><div class="hist-content"><div class="table-wrapper" style="border-radius:0;"><table>${newTable}</tbody></table></div></div></div>`;
                });
            }
        } catch(e) { console.log(e); }
    }

    function calculate(p, idx, isM, isDB) {
        let base = {0:100, 1:90, 2:80, 3:70, 4:60, 5:50}[idx] || 0;
        let bM = isDB ? 2 : 1; let bonus = 0;
        if(parseInt(p.putt) > 0) bonus += (25*bM); if(parseInt(p.shot) > 0) bonus += (25*bM);
        if(p.ace && p.ace.trim() !== "") bonus += (50*bM); if(p.alby && p.alby.trim() !== "") bonus += (50*bM);
        return isM ? (base + bonus) * 2 : (base + bonus);
    }
    window.onload = loadData;
</script>
</body>
</html>
