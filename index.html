<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Golf League Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary: #1e293b; --secondary: #10b981; --accent: #fbbf24; 
            --bg: #0f172a; --card-bg: #ffffff; --text-main: #1e293b;
            --major-grad: linear-gradient(135deg, #4c1d95 0%, #7c3aed 100%);
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            margin: 0; padding: 15px; color: white; 
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: auto; }

        /* Header Area */
        .header-card { 
            background: var(--card-bg); padding: 40px 20px; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 30px; 
            text-align: center; position: relative; border-bottom: 4px solid var(--secondary);
            color: var(--primary);
        }
        .header-card.major { background: var(--major-grad); color: white; border-bottom: 4px solid var(--accent); }

        #hof-trigger { position: absolute; top: 15px; left: 15px; }
        .hof-btn { background: rgba(16, 185, 129, 0.2); color: var(--secondary); border: 1px solid var(--secondary); padding: 6px 14px; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: bold; }

        h2 { color: white; font-size: 1.4rem; margin: 40px 0 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        h3 { color: var(--secondary); text-align: left; margin-bottom: 10px; font-size: 1.2rem; }

        /* Table & Scroll Logic */
        .scroll-box { 
            width: 100%; overflow-x: auto; background: white; 
            border-radius: 12px; margin-bottom: 25px; color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; table-layout: auto; }
        th { background: #f8fafc; color: #64748b; padding: 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 14px; }

        /* Prevent Name Wrapping */
        .p-name-cell { 
            text-align: left !important; 
            white-space: nowrap; 
            min-width: 160px; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pos-cell { width: 45px; font-weight: 800; color: #64748b; background: #f1f5f9; border-right: 1px solid #e2e8f0; }
        .points-cell { background: #f0fdf4; color: #15803d; font-weight: 800; width: 60px; }
        .under-par { color: #ef4444; font-weight: 800; }
        .even-par { color: #10b981; font-weight: 800; }

        /* Standings Grid */
        .standings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .st-card { background: white; border-radius: 12px; overflow: hidden; }
        .st-card h4 { background: var(--primary); color: white; margin: 0; padding: 12px; text-align: center; font-size: 11px; letter-spacing: 1px; }

        /* History Items (Matching Standings style) */
        .history-card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 20px; color: var(--text-main); }
        .history-header { background: #334155; color: white; padding: 10px 15px; font-weight: bold; font-size: 13px; }
        
        /* HOF Overlay */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 2000; overflow-y: auto; padding: 20px; }
        .recap-card { max-width: 900px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="hof-trigger" style="display:none;"><button class="hof-btn" onclick="openHof()">🏆 HALL OF FAME</button></div>
    
    <div id="header" class="header-card">
        <h1 id="v-name">Tournament Results</h1>
        <div class="event-meta">
            <span id="v-sw">S-- W--</span> &bull; <span id="v-date">--</span>
        </div>
    </div>

    <h2><i class="fa-solid fa-trophy"></i> Weekly Leaderboard</h2>
    <div id="div-tables"></div>

    <h2><i class="fa-solid fa-ranking-star"></i> Season Standings</h2>
    <div class="standings-grid" id="standings-area"></div>

    <h2><i class="fa-solid fa-clock-rotate-left"></i> History</h2>
    <div id="history-area"></div>
</div>

<div id="hofOverlay" class="overlay">
    <div class="recap-card">
        <span style="float:right; cursor:pointer; font-size:30px;" onclick="closeHof()">&times;</span>
        <h1 style="text-align:center;">Archives</h1>
        <div id="season-selector" style="text-align:center; margin-bottom:20px;"></div>
        <div id="hof-display-area"></div>
    </div>
</div>

<script>
    let globalHof = [];
    function getConsoleIcon(v) { 
        let color = v==="PS"?"#003791":v==="Xbox"?"#107C10":"#171a21";
        let icon = v==="PS"?"playstation":v==="Xbox"?"xbox":"steam";
        return `<i class="fa-brands fa-${icon}" style="color:${color}; font-size:16px;"></i>`; 
    }
    
    function parseToPar(v) { 
        if(!v||v==="") return 999; 
        let c = v.toString().trim().toUpperCase(); 
        if(c==='E'||c==='0') return 0; 
        return isNaN(parseInt(v)) ? 999 : parseInt(v); 
    }

    async function loadData() {
        try {
            const res = await fetch('data.json'); 
            const d = await res.json();
            
            document.getElementById('v-name').innerText = d.venue||"Tournament";
            document.getElementById('v-sw').innerText = `Season ${d.seasonNum} Week ${d.weekNum}`;
            document.getElementById('v-date').innerText = d.date||"";
            
            if(d.isSig) document.getElementById('header').classList.add('major');
            
            if(d.hallOfFame) {
                globalHof = d.hallOfFame; 
                document.getElementById('hof-trigger').style.display='block';
                const sel = document.getElementById('season-selector');
                globalHof.forEach((e, i) => sel.innerHTML += `<button onclick="showHof(${i}, this)" style="margin:5px; padding:8px 15px; cursor:pointer;">S${e.season}</button>`);
            }

            // Division Tables
            const divArea = document.getElementById('div-tables');
            [1,2,3].forEach(dv => {
                const players = d.players.filter(p => p.division == dv).sort((a,b) => parseToPar(a.toPar)-parseToPar(b.toPar));
                let h = `<h3>Division ${dv}</h3><div class="scroll-box"><table><thead><tr><th class="pos-cell">POS</th><th class="left-align">Player</th><th>To Par</th><th>Putt</th><th>Shot</th><th>Ace</th><th>Alby</th><th class="points-cell">PTS</th></tr></thead><tbody>`;
                
                players.forEach((p) => {
                    let s = parseToPar(p.toPar); 
                    let firstIdx = players.findIndex(x => parseToPar(x.toPar) === s);
                    let pos = s === 999 ? "--" : (firstIdx + 1);
                    let pts = (p.toPar!=="" || p.putt!=="") ? calculate(p, firstIdx, d.isSig, d.doubleBonus) : "--";
                    
                    h += `<tr>
                        <td class="pos-cell">${pos}</td>
                        <td><div class="p-name-cell">${getConsoleIcon(p.console)} ${p.name}</div></td>
                        <td class="${s<0?'under-par':(s===0?'even-par':'')}">${p.toPar||'--'}</td>
                        <td>${p.putt||'--'}</td><td>${p.shot||'--'}</td><td>${p.ace||'--'}</td><td>${p.alby||'--'}</td>
                        <td class="points-cell">${pts}</td>
                    </tr>`;
                });
                divArea.innerHTML += h + `</tbody></table></div>`;
            });

            // Standings
            const sArea = document.getElementById('standings-area');
            const arch = d.season||{};
            [1,2,3].forEach(dv => {
                let h = `<div class="st-card"><h4>DIVISION ${dv}</h4><div class="scroll-box" style="margin-bottom:0; box-shadow:none;"><table><thead><tr><th class="pos-cell">POS</th><th class="left-align">Player</th><th class="points-cell">PTS</th></tr></thead><tbody>`;
                let sp = d.players.filter(p => p.division == dv).map(p => {
                    let wPts = (p.toPar!=="" || p.putt!=="") ? calculate(p, 0, d.isSig, d.doubleBonus, true) : 0;
                    return { name: p.name, total: (arch[p.name]?.points||0)+wPts };
                }).sort((a,b) => b.total-a.total);
                sp.forEach((p, i) => h += `<tr><td class="pos-cell">${i+1}</td><td><div class="p-name-cell">${p.name}</div></td><td class="points-cell">${p.total}</td></tr>`);
                sArea.innerHTML += h + "</tbody></table></div></div>";
            });

            // History (Formatted like Standings)
            const histArea = document.getElementById('history-area');
            if(d.historyHtml) {
                // We wrap the history items in our new high-contrast card style
                histArea.innerHTML = `<div class="history-card">${d.historyHtml}</div>`;
            }
        } catch(e) { console.log(e); }
    }

    function calculate(p, idx, isM, isDB) {
        let base = {0:100, 1:90, 2:80, 3:70, 4:60, 5:50}[idx] || 0;
        let bM = isDB ? 2 : 1; let bonus = 0;
        if(p.putt > 0) bonus += (25*bM); if(p.shot > 0) bonus += (25*bM);
        if(p.ace && p.ace.trim()!=="") bonus += (50*bM); if(p.alby && p.alby.trim()!=="") bonus += (50*bM);
        let tot = base + bonus; return isM ? tot * 2 : tot;
    }

    function openHof() { document.getElementById('hofOverlay').style.display='block'; }
    function closeHof() { document.getElementById('hofOverlay').style.display='none'; }
    window.onload = loadData;
</script>
</body>
</html>
