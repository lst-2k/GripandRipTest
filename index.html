<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grip&Rip Rebirth74</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary: #6366f1;
            --secondary: #10b981; 
            --accent: #fbbf24; 
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --red: #ef4444; 
            --green: #22c55e;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            margin: 0; 
            padding: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
        }

        .container { width: 100%; max-width: 1000px; margin: auto; }

        .logo-container { margin: 10px 10px 20px 10px; border-radius: 12px; overflow: hidden; }
        .logo-container img { width: 100%; height: auto; display: block; }

        .header-card { 
            background: var(--card-bg); 
            padding: 25px 15px; 
            margin: 0 10px 25px 10px;
            border-radius: 16px; 
            text-align: center; 
            border: 1px solid var(--border);
        }
        
        .header-card.is-major { 
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%); 
            border-bottom: 4px solid var(--accent);
        }

        .badge-area { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .event-badge { padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; display: none; }
        .is-major .major-tag { display: inline-block; background: var(--accent); color: #000; }
        .has-db .db-tag { display: inline-block; background: var(--secondary); color: #fff; }

        h2 { 
            font-size: 1rem; margin: 30px 15px 15px 15px; display: flex; align-items: center; 
            gap: 10px; text-transform: uppercase; color: var(--text-dim);
        }
        h3 { 
            background: rgba(255,255,255,0.05); padding: 12px 15px; margin: 0; 
            font-size: 0.9rem; color: var(--secondary); border-top: 1px solid var(--border);
        }

        .table-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            background: var(--card-bg); 
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
            -webkit-overflow-scrolling: touch;
        }

        table { 
            width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 480px; 
        }

        th { 
            background: rgba(15, 23, 42, 0.7); color: var(--text-dim); 
            padding: 12px 5px; font-size: 10px; text-transform: uppercase; 
            text-align: center; border-bottom: 1px solid var(--border);
        }

        td { 
            padding: 14px 5px; border-bottom: 1px solid var(--border); 
            text-align: center; font-size: 13px; font-weight: 500;
        }

        /* Column Widths */
        .col-pos { width: 40px; font-weight: 800; background: rgba(0,0,0,0.1); }
        .col-player { width: 130px; text-align: left !important; padding-left: 10px !important; }
        .col-data { width: 45px; }
        .col-pts { width: 60px; background: rgba(16, 185, 129, 0.1); color: var(--secondary); font-weight: 800; }

        .p-name-cell { display: flex; align-items: center; gap: 6px; white-space: nowrap; }

        .score-red { color: var(--red); font-weight: 800; }
        .score-green { color: var(--green); font-weight: 800; }

        .highlights-bar { 
            display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 15px; 
            background: rgba(0,0,0,0.3); margin-bottom: 30px; border-bottom: 1px solid var(--border);
        }
        .high-tag { 
            background: #0f172a; padding: 4px 8px; border-radius: 4px; 
            font-size: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 5px;
        }
        .high-tag.gold { border-color: var(--accent); color: var(--accent); }

        .st-card { margin-bottom: 25px; width: 100%; }
        .st-card h4 { margin: 0; padding: 12px 15px; background: #334155; font-size: 11px; text-transform: uppercase; }

        .hist-acc { border-bottom: 1px solid var(--border); }
        .hist-header { background: var(--card-bg); padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .hist-content { display: none; padding: 0; background: #0f172a; }
        .hist-content.active { display: block; }

        #backToTop { 
            position: fixed; bottom: 20px; right: 20px; width: 40px; height: 40px; 
            background: var(--primary); color: white; border: none; border-radius: 8px; 
            cursor: pointer; display: none; z-index: 1000;
        }
		.ticker-wrap {
    width: 100%;
    overflow: hidden;
    background-color: #1e293b; /* Dark Slate */
    color: white;
    height: 40px;
    display: flex;
    align-items: center;
    border-bottom: 3px solid #3b82f6; /* Blue accent */
    margin-bottom: 20px;
}

.ticker-title {
    background: #ef4444; /* Red "Live" box */
    padding: 0 20px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: bold;
    font-size: 14px;
    z-index: 2;
    white-space: nowrap;
}

.ticker {
    display: flex;
    white-space: nowrap;
    padding-left: 100%;
    animation: ticker-animation 30s linear infinite;
}

.ticker__item {
    display: inline-block;
    padding: 0 50px;
    font-size: 14px;
    text-transform: uppercase;
    font-weight: 500;
}

@keyframes ticker-animation {
    0% { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-100%, 0, 0); }
}

.ticker:hover {
    animation-play-state: paused; /* Pause on hover so you can read it */
}
    </style>
</head>
<body>

<button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><i class="fa-solid fa-arrow-up"></i></button>

<div class="container">
    <div class="logo-container"><img src="logo.png" alt="League Logo"></div>
<div class="ticker-wrap">
    <div class="ticker-title">Upcoming Events</div>
    <div class="ticker" id="live-ticker">
        <!-- Content generated by JavaScript -->
        <div class="ticker__item">Welcome to Season 6, Apr 30 - May 6 California Club</div>
    </div>
</div>
    
    <div id="header" class="header-card">
        <div class="badge-area">
            <span class="event-badge major-tag">🏆 Major</span>
            <span class="event-badge db-tag">🔥 2X Points</span>
        </div>
        <h1 id="v-name" style="margin:0; font-size: 1.5rem;">Tournament</h1>
        <div style="margin-top:5px; font-size: 13px; color: var(--text-dim);">
            <span id="v-sw">Season -- Week --</span> • <span id="v-date">--</span>
        </div>
    </div>

    <h2><i class="fa-solid fa-trophy"></i> Leaderboards</h2>
    <div id="div-tables"></div>

    <h2><i class="fa-solid fa-ranking-star"></i> Season Standings</h2>
    <div id="standings-area"></div>

    <div class="logo-container"><img src="2k25logo.png" alt="2K25 Logo"></div>

    <h2><i class="fa-solid fa-clock-rotate-left"></i> History</h2>
    <div id="history-area"></div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* Ticker Styling */
    .ticker-wrap {
        width: 100%; overflow: hidden; background-color: #1e293b; 
        color: white; height: 40px; display: flex; align-items: center;
        border-bottom: 3px solid #3b82f6; margin-bottom: 20px;
    }
    .ticker-title {
        background: #ef4444; padding: 0 20px; height: 100%;
        display: flex; align-items: center; font-weight: bold;
        font-size: 14px; z-index: 2; white-space: nowrap;
    }
    .ticker {
        display: flex; white-space: nowrap; padding-left: 100%;
        animation: ticker-animation 25s linear infinite;
    }
    .ticker__item { display: inline-block; padding: 0 50px; font-size: 14px; text-transform: uppercase; }
    @keyframes ticker-animation { 
        0% { transform: translate3d(0, 0, 0); } 
        100% { transform: translate3d(-100%, 0, 0); } 
    }
    .ticker:hover { animation-play-state: paused; }
</style>

<script>
    // 1. DATA INITIALIZATION
    let leagueData = JSON.parse(localStorage.getItem('golfAdminData')) || {
        venue: "", date: "", seasonNum: 1, weekNum: 1, isSig: false, doubleBonus: false,
        players: [], season: {}, upcoming: [], lastFinalizedWeek: 0
    };

    let lastFocusedId = null;

    function init() {
        document.getElementById('venueName').value = leagueData.venue || "";
        document.getElementById('seasonNum').value = leagueData.seasonNum || 1;
        document.getElementById('weekNum').value = leagueData.weekNum || 1;
        document.getElementById('isSig').checked = !!leagueData.isSig;
        document.getElementById('doubleBonus').checked = !!leagueData.doubleBonus;
        
        flatpickr("#dateRange", { mode: "range", dateFormat: "Y-m-d", defaultDate: leagueData.date ? leagueData.date.split(" to ") : [] });

        renderTables();
        setupNavigation();
    }

    // 2. RENDERING ENGINE
    function renderTables() {
        const container = document.getElementById('division-container');
        if (!container) return;
        container.innerHTML = '';
        
        [1, 2, 3, 0].forEach(divNum => {
            const temp = document.getElementById('div-template').content.cloneNode(true);
            temp.querySelector('.header-text').innerText = divNum === 0 ? "Inactive" : "Division " + divNum;
            const tbody = temp.querySelector('tbody');
            
            const players = leagueData.players.filter(p => p.division == divNum).sort((a,b) => parseScore(a.toPar) - parseScore(b.toPar));
            
            players.forEach((p, idx) => {
                let tiedRank = players.findIndex(pl => parseScore(pl.toPar) === parseScore(p.toPar));
                const weeklyPts = (p.toPar !== "" || p.putt !== "") ? calculatePoints(p, tiedRank) : 0;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${p.name}</strong></td>
                    <td><input type="text" id="input-${p.name}-toPar" value="${p.toPar||''}" onchange="updatePlayerData('${p.name}','toPar',this.value)"></td>
                    <td><input type="text" id="input-${p.name}-putt" value="${p.putt||''}" onchange="updatePlayerData('${p.name}','putt',this.value)"></td>
                    <td><input type="text" id="input-${p.name}-shot" value="${p.shot||''}" onchange="updatePlayerData('${p.name}','shot',this.value)"></td>
                    <td><input type="text" id="input-${p.name}-ace" value="${p.ace||''}" onchange="updatePlayerData('${p.name}','ace',this.value)"></td>
                    <td><input type="text" id="input-${p.name}-alby" value="${p.alby||''}" onchange="updatePlayerData('${p.name}','alby',this.value)"></td>
                    <td><input type="text" value="${leagueData.season[p.name]?.acc || ''}" onchange="updateSeasonAcc('${p.name}', this.value)"></td>
                    <td style="text-align:center; font-weight:bold; color:#10b981;">${weeklyPts}</td>
                    <td class="action-cell">
                        <button class="btn btn-move" onclick="movePlayer('${p.name}', -1)"><i class="fa-solid fa-angle-up"></i></button>
                        <button class="btn btn-move" onclick="movePlayer('${p.name}', 1)"><i class="fa-solid fa-angle-down"></i></button>
                        <button class="btn btn-danger" onclick="removePlayer('${p.name}')">×</button>
                    </td>`;
                tbody.appendChild(row);
            });
            container.appendChild(temp);

            if (divNum > 0 && players.length > 0) {
                renderSubStandings(container, players, divNum);
            }
        });
        
        updateTicker();
        if (lastFocusedId) { const el = document.getElementById(lastFocusedId); if (el) el.focus(); }
    }

    function renderSubStandings(container, players, divNum) {
        const standingsDiv = document.createElement('div');
        standingsDiv.className = 'admin-card';
        standingsDiv.style = "margin: -10px 0 30px 0; background: #f8fafc; border-radius: 0 0 8px 8px; padding: 15px; border: 1px solid #e2e8f0; border-top:none;";
        
        const projected = players.map(p => {
            let tiedRank = players.findIndex(pl => parseScore(pl.toPar) === parseScore(p.toPar));
            const wkPts = (p.toPar !== "" || p.putt !== "") ? calculatePoints(p, tiedRank) : 0;
            const hist = leagueData.season[p.name] || { totalPoints: 0, wins: 0, acc: "E" };
            
            let hAcc = (hist.acc === "E" || !hist.acc) ? 0 : parseInt(hist.acc.toString().replace("+",""));
            let wAcc = (p.toPar !== "" && p.toPar !== "E") ? parseInt(p.toPar.toString().replace("+","")) : 0;
            let totalAcc = hAcc + wAcc;
            let displayAcc = totalAcc === 0 ? "E" : (totalAcc > 0 ? "+" + totalAcc : totalAcc);

            return { name: p.name, total: (hist.totalPoints || 0) + wkPts, weekly: wkPts, acc: displayAcc, wins: hist.wins || 0 };
        }).sort((a, b) => b.total - a.total);

        let h = `<h4 style="margin:0 0 10px 0; font-size:11px; color:#64748b;">PROJECTED SEASON STANDINGS</h4><table style="width:100%; font-size:13px;">`;
        h += `<tr style="text-align:left; color:#94a3b8;"><th>Player</th><th>WINS</th><th>S. ACC</th><th>WK PTS</th><th>TOTAL</th></tr>`;
        projected.forEach(p => {
            h += `<tr style="border-bottom:1px solid #eee;"><td>${p.name}</td><td>${p.wins}</td><td>${p.acc}</td><td>+${p.weekly}</td><td><strong>${p.total}</strong></td></tr>`;
        });
        standingsDiv.innerHTML = h + `</table>`;
        container.appendChild(standingsDiv);
    }

    // 3. TICKER LOGIC
    function addTickerEvent() {
        const input = document.getElementById('eventText');
        if (input.value.trim()) {
            leagueData.upcoming.push(input.value.trim());
            input.value = "";
            saveAndRefresh();
        }
    }

    function clearTickerEvents() {
        leagueData.upcoming = [];
        saveAndRefresh();
    }

    function updateTicker() {
        const tickerContainer = document.getElementById('live-ticker');
        if (!tickerContainer) return;
        if (!leagueData.upcoming || leagueData.upcoming.length === 0) {
            tickerContainer.innerHTML = '<div class="ticker__item">No upcoming events scheduled.</div>';
            return;
        }
        tickerContainer.innerHTML = leagueData.upcoming.map(e => `<div class="ticker__item">🗓️ ${e}</div>`).join("");
    }

    // 4. DATA ACTIONS
    function updatePlayerData(name, field, value) {
        const p = leagueData.players.find(x => x.name === name);
        if (!p) return;
        lastFocusedId = `input-${name}-${field}`;
        let val = value.trim().toUpperCase();
        if (field === 'toPar' && val !== "" && !isNaN(val.replace("+",""))) {
            let num = parseInt(val.replace("+",""));
            val = num > 0 ? "+" + num : (num === 0 ? "E" : num.toString());
        }
        p[field] = val;
        saveAndRefresh();
    }

    function exportArchive() {
        const wn = "W" + document.getElementById('weekNum').value;
        if(!confirm(`Finalize ${wn}? (Safe to overwrite)`)) return;
        leagueData.players.forEach(p => {
            if(p.division > 0 && (p.toPar !== "" || p.putt !== "")) {
                const divPlayers = leagueData.players.filter(pl => pl.division == p.division).sort((a,b) => parseScore(a.toPar) - parseScore(b.toPar));
                const rank = divPlayers.findIndex(pl => pl.name === p.name);
                const currentWkPts = calculatePoints(p, rank);
                if(!leagueData.season[p.name]) leagueData.season[p.name] = { totalPoints: 0, wins: 0, acc: "E", history: {}, winHistory: {} };
                const s = leagueData.season[p.name];
                s.totalPoints = (s.totalPoints - (s.history[wn] || 0)) + currentWkPts;
                s.history[wn] = currentWkPts;
                s.winHistory[wn] = (rank === 0) ? 1 : 0;
                s.wins = Object.values(s.winHistory).reduce((a, b) => a + b, 0);
            }
        });
        saveAndRefresh();
    }

    function calculatePoints(p, rank) {
        let base = Math.max(10, 100 - (rank * 10));
        let bM = document.getElementById('doubleBonus').checked ? 2 : 1;
        let bonus = (parseInt(p.putt)>0 ? 25*bM : 0) + (parseInt(p.shot)>0 ? 25*bM : 0) + (p.ace ? 50*bM : 0) + (p.alby ? 50*bM : 0);
        let total = base + bonus;
        return document.getElementById('isSig').checked ? total * 2 : total;
    }

    function parseScore(v) { if (!v || v === "" || v === "E") return 0; return parseInt(v.toString().replace("+","")) || 0; }
    function saveAndRefresh() { localStorage.setItem('golfAdminData', JSON.stringify(leagueData)); renderTables(); }
    function movePlayer(name, dir) { 
        const p = leagueData.players.find(x => x.name === name); if (!p) return;
        let cur = p.division === 0 ? 4 : p.division;
        let next = Math.max(1, Math.min(4, cur + dir));
        p.division = next === 4 ? 0 : next;
        saveAndRefresh();
    }
    function removePlayer(name) { if(confirm("Delete " + name + "?")) { leagueData.players = leagueData.players.filter(p => p.name !== name); saveAndRefresh(); } }
    function setupNavigation() {
        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            if (active.tagName !== 'INPUT' || !active.closest('tr')) return;
            const row = active.closest('tr'); const colIdx = active.closest('td').cellIndex;
            if (e.key === "ArrowUp") row.previousElementSibling?.cells[colIdx].querySelector('input')?.focus();
            if (e.key === "ArrowDown" || e.key === "Enter") row.nextElementSibling?.cells[colIdx].querySelector('input')?.focus();
        });
    }

    window.onload = init;
</script>
</body>
</html>
