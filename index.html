<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Leaderboard & Standings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #37474f;
            --secondary: #2e7d32;
            --accent: #ffd54f;
            --major-bg: #4a148c;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 100%; width: 1200px; margin: auto; }

        /* Header / Venue Card */
        .header-card { 
            background: white; padding: 30px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px;
            text-align: center; position: relative; overflow: hidden;
        }
        .header-card.major { background: var(--major-bg); color: white; border: 4px solid var(--accent); }
        .major-tag { 
            display: none; position: absolute; top: 15px; right: 15px; 
            background: var(--accent); color: #000; padding: 5px 15px; 
            border-radius: 20px; font-weight: bold; font-size: 14px; text-transform: uppercase;
        }
        .major .major-tag { display: block; }
        
        h1 { margin: 0 0 10px 0; font-size: clamp(1.5rem, 5vw, 2.5rem); }
        .event-meta { font-size: 1.1rem; opacity: 0.9; font-weight: 500; }

        /* Division Sections */
        h2 { border-left: 5px solid var(--primary); padding-left: 15px; margin-top: 40px; font-size: 1.5rem; }
        h3 { color: var(--primary); margin-bottom: 10px; }

        /* Full Width Scrollable Container */
        .scroll-container { 
            width: 100%; 
            overflow-x: auto; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
        }

        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #cfd8dc; color: var(--primary); padding: 12px; font-size: 11px; text-transform: uppercase; text-align: center; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        
        .pos-cell { font-weight: bold; background: #f9f9f9; width: 50px; position: sticky; left: 0; z-index: 1; border-right: 1px solid #ddd; }
        .player-name { text-align: left; font-weight: bold; min-width: 150px; }
        .points-cell { font-weight: bold; color: var(--secondary); background: #f1f8e9; }
        
        /* Par Colors */
        .under-par { color: #d32f2f !important; font-weight: bold; }
        .even-par { color: #2e7d32 !important; font-weight: bold; }

        /* Standings Grid */
        .standings-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; margin-bottom: 40px;
        }
        .standings-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .standings-card h4 { background: var(--primary); color: white; margin: 0; padding: 12px; text-align: center; }
        .standings-card table { min-width: 100%; }

        /* History Customization */
        #history-area .history-item { margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        #history-area .history-header { background: var(--primary); color: white; padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        #history-area .history-content { padding: 15px; background: white; overflow-x: auto; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .header-card { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="header" class="header-card">
        <div class="major-tag">Major Event</div>
        <h1 id="v-name">Loading Tourney...</h1>
        <div class="event-meta">
            <span id="v-season-week">Season -- Week --</span> 
            &bull; 
            <span id="v-date">--</span>
        </div>
    </div>

    <h2>Weekly Leaderboard</h2>
    <div id="division-tables"></div>

    <h2>Season Standings</h2>
    <div class="standings-grid" id="standings-area"></div>

    <div class="history-section">
        <h2>Weekly History</h2>
        <div id="history-area"></div>
    </div>
</div>

<script>
    function getConsoleIcon(val) {
        if (val === "PS") return `<i class="fa-brands fa-playstation" style="color:#003791;"></i>`;
        if (val === "Xbox") return `<i class="fa-brands fa-xbox" style="color:#107C10;"></i>`;
        return `<i class="fa-brands fa-steam" style="color:#171a21;"></i>`;
    }

    function parseToPar(v) {
        if(!v || v === "" || v === "--") return 999;
        let clean = v.toString().trim().toUpperCase();
        if(clean === 'E' || clean === '0') return 0;
        let n = parseInt(v);
        return isNaN(n) ? 999 : n;
    }

    function getScoreClass(v) { 
        let val = parseToPar(v);
        if(val === 999) return "";
        if(val === 0) return 'even-par';
        if(val < 0) return 'under-par'; 
        return ""; 
    }

    async function loadData() {
        try {
            const response = await fetch('data.json');
            const d = await response.json();

            document.getElementById('v-name').innerText = d.venue || "Tournament Results";
            document.getElementById('v-season-week').innerText = `Season ${d.seasonNum || '--'} Week ${d.weekNum || '--'}`;
            document.getElementById('v-date').innerText = d.date || "No Date Set";
            if(d.isSig) document.getElementById('header').classList.add('major');

            const divContainer = document.getElementById('division-tables');
            [1,2,3].forEach(divNum => {
                const divPlayers = d.players.filter(p => p.division == divNum);
                divPlayers.sort((a,b) => parseToPar(a.toPar) - parseToPar(b.toPar));

                let tableHtml = `<h3>Division ${divNum}</h3><div class="scroll-container"><table>
                    <thead><tr><th>POS</th><th>Player</th><th>To Par</th><th>Putt</th><th>Shot</th><th>Ace</th><th>Alby</th><th>Points</th></tr></thead>
                    <tbody>`;
                
                divPlayers.forEach((p, idx) => {
                    let score = parseToPar(p.toPar);
                    let firstIdx = divPlayers.findIndex(x => parseToPar(x.toPar) === score);
                    let tieCount = divPlayers.filter(x => parseToPar(x.toPar) === score).length;
                    
                    let posText = (score === 999) ? "--" : ((tieCount > 1 ? "T" : "") + (firstIdx + 1));
                    
                    // Simple logic to check if they played: points > 0 or they entered a par score
                    let hasPlayed = (p.toPar !== "" || p.putt !== "" || p.shot !== "");
                    let ptsDisplay = hasPlayed ? calculatePoints(p, firstIdx, d.isSig) : "--";

                    tableHtml += `<tr>
                        <td class="pos-cell">${posText}</td>
                        <td class="player-name">${getConsoleIcon(p.console)} ${p.name}</td>
                        <td class="${getScoreClass(p.toPar)}">${p.toPar || '--'}</td>
                        <td>${p.putt ? p.putt+'ft' : '--'}</td>
                        <td>${p.shot ? p.shot+'yds' : '--'}</td>
                        <td>${p.ace || '--'}</td>
                        <td>${p.alby || '--'}</td>
                        <td class="points-cell">${ptsDisplay}</td>
                    </tr>`;
                });
                tableHtml += `</tbody></table></div>`;
                divContainer.innerHTML += tableHtml;
            });

            // Season Standings Logic
            const standingsArea = document.getElementById('standings-area');
            const arch = d.season || {};
            [1,2,3].forEach(divNum => {
                let sHtml = `<div class="standings-card"><h4>Div ${divNum} Standings</h4><table><thead><tr><th>POS</th><th>Player</th><th>EV</th><th>PTS</th></tr></thead><tbody>`;
                
                let sPlayers = d.players.filter(p => p.division == divNum).map(p => {
                    let playedThisWeek = (p.toPar !== "" || p.putt !== "" || p.shot !== "");
                    let weeklyPts = playedThisWeek ? calculatePoints(p, 0, d.isSig, true) : 0; 
                    return {
                        name: p.name,
                        total: (arch[p.name]?.points || 0) + weeklyPts,
                        ev: (arch[p.name]?.eventsPlayed || 0) + (weeklyPts > 0 ? 1 : 0)
                    };
                }).sort((a,b) => b.total - a.total);

                sPlayers.forEach((p, i) => {
                    let firstIdx = sPlayers.findIndex(x => x.total === p.total);
                    let tieCount = sPlayers.filter(x => x.total === p.total).length;
                    let pos = (p.total === 0) ? "--" : ((tieCount > 1 ? "T" : "") + (firstIdx + 1));
                    sHtml += `<tr><td class="pos-cell">${pos}</td><td style="text-align:left;">${p.name}</td><td>${p.ev}</td><td class="points-cell">${p.total}</td></tr>`;
                });
                sHtml += `</tbody></table></div>`;
                standingsArea.innerHTML += sHtml;
            });

            document.getElementById('history-area').innerHTML = d.historyHtml || "<p>No history archived yet.</p>";

        } catch (err) {
            document.getElementById('v-name').innerText = "Waiting for data.json...";
        }
    }

    function calculatePoints(p, idx, isSig, isInternalSort = false) {
        let base = {0:100, 1:90, 2:80, 3:70, 4:60, 5:50}[idx] || 0;
        let total = base;
        if(p.putt > 0) total += 25;
        if(p.shot > 0) total += 25;
        if(p.ace && p.ace.trim() !== "") total += 50;
        if(p.alby && p.alby.trim() !== "") total += 50;
        return isSig ? total * 2 : total;
    }

    window.onload = loadData;
</script>

</body>
</html>
