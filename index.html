<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGL League Standings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --secondary: #10b981; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--primary); padding-bottom: 50px; }
        
        /* Header & Branding */
        .hero { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 40px 20px; text-align: center; border-bottom: 4px solid var(--secondary); }
        .hero h1 { margin: 0; font-size: 28px; letter-spacing: -1px; }
        .venue-tag { display: inline-block; background: rgba(16, 185, 129, 0.2); color: var(--secondary); padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-top: 10px; border: 1px solid var(--secondary); }

        .container { max-width: 1000px; margin: -30px auto 0; padding: 0 15px; }

        /* Division Cards */
        .div-card { background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 25px; overflow: hidden; border: 1px solid #e2e8f0; }
        .div-header { background: #f1f5f9; padding: 15px 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #475569; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: #94a3b8; text-transform: uppercase; padding: 12px 20px; background: #fafafa; }
        td { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; font-weight: 500; }
        .left-align { text-align: left; }
        .p-name-cell { display: flex; align-items: center; gap: 10px; font-weight: 700; }

        /* Highlights Bar (New) */
        .highlights-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        .high-tag { background: white; padding: 5px 12px; border-radius: 6px; font-size: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .high-tag.gold { background: #fffbeb; border-color: #fde68a; color: #92400e; font-weight: bold; }

        /* Score Colors */
        .score-e { color: #94a3b8; }
        .score-minus { color: #ef4444; font-weight: 800; }
        .score-plus { color: #1e293b; }

        /* History Accordions */
        .hist-acc { background: white; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e2e8f0; overflow: hidden; }
        .hist-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; background: white; transition: 0.2s; }
        .hist-header:hover { background: #f8fafc; }
        .hist-content { display: none; padding: 0; border-top: 1px solid #eee; }
        .hist-content.active { display: block; }
    </style>
</head>
<body>

<div class="hero">
    <h1 id="league-title">PGL LEAGUE STANDINGS</h1>
    <div id="venue-display" class="venue-tag">Loading current week...</div>
</div>

<div class="container">
    <div id="division-area"></div>
    
    <h2 style="margin-top: 40px; font-size: 20px;">Weekly Archive</h2>
    <div id="history-area"></div>
</div>

<script>
    function getIcon(val) {
        if (val === "PS") return `<i class="fa-brands fa-playstation" style="color:#003791;"></i>`;
        if (val === "Xbox") return `<i class="fa-brands fa-xbox" style="color:#107C10;"></i>`;
        return `<i class="fa-brands fa-steam" style="color:#171a21;"></i>`;
    }

    function getScoreClass(val) {
        if (!val || val == "0" || val.toUpperCase() == "E") return "score-e";
        if (val.includes("-")) return "score-minus";
        return "score-plus";
    }

    async function loadData() {
        try {
            const response = await fetch('data.json?t=' + Date.now());
            const d = await response.json();

            // Set Title & Venue
            document.getElementById('venue-display').innerHTML = `S${d.seasonNum} W${d.weekNum} &bull; ${d.venue} &bull; ${d.date}`;

            const divArea = document.getElementById('division-area');
            divArea.innerHTML = "";

            // Loop Divisions
            [1, 2, 3].forEach(divNum => {
                let maxP = { n: "", v: 0 };
                let maxS = { n: "", v: 0 };
                let aces = [];
                let albys = [];

                let h = `<div class="div-card">
                    <div class="div-header">Division ${divNum}</div>
                    <table>
                        <thead><tr><th class="left-align">Player</th><th style="text-align:center;">To Par</th><th style="text-align:center;">Points</th></tr></thead>
                        <tbody>`;

                const players = d.players.filter(p => p.division == divNum);
                
                // Sort by To Par for display
                players.sort((a,b) => {
                    const parse = (v) => { if(!v || v=="" || v.toUpperCase()=="E") return 0; return parseInt(v); };
                    return parse(a.toPar) - parse(b.toPar);
                });

                players.forEach(p => {
                    if (p.toPar === "" && p.putt === "") return;

                    h += `<tr>
                        <td class="left-align">
                            <div class="p-name-cell">${getIcon(p.console)} ${p.name}</div>
                        </td>
                        <td style="text-align:center;" class="${getScoreClass(p.toPar)}">${p.toPar || 'E'}</td>
                        <td style="text-align:center; font-weight:bold; color:var(--secondary);">${p.points || 0}</td>
                    </tr>`;

                    // Track Highlights
                    let pVal = parseFloat(p.putt) || 0;
                    let sVal = parseFloat(p.shot) || 0;
                    if (pVal > maxP.v) { maxP.v = pVal; maxP.n = p.name; }
                    if (sVal > maxS.v) { maxS.v = sVal; maxS.n = p.name; }
                    if (p.ace && p.ace.trim() !== "") aces.push(p.name);
                    if (p.alby && p.alby.trim() !== "") albys.push(p.name);
                });

                h += `</tbody></table>`;

                // Highlights Bar
                let hBar = `<div class="highlights-bar">`;
                if(maxP.v > 0) hBar += `<div class="high-tag"><span>🎯</span> <strong>Longest Putt:</strong> ${maxP.n} (${maxP.v}ft)</div>`;
                if(maxS.v > 0) hBar += `<div class="high-tag"><span>🏌🏻</span> <strong>Longest Shot:</strong> ${maxS.n} (${maxS.v}yds)</div>`;
                aces.forEach(n => hBar += `<div class="high-tag gold"><span>⛳</span> <strong>ACE:</strong> ${n}</div>`);
                albys.forEach(n => hBar += `<div class="high-tag gold"><span>🦅</span> <strong>ALBATROSS:</strong> ${n}</div>`);
                hBar += `</div>`;

                divArea.innerHTML += h + ( (maxP.v > 0 || maxS.v > 0 || aces.length > 0 || albys.length > 0) ? hBar : "" ) + `</div>`;
            });

            // History Section
            if (d.historyHtml) {
                const histArea = document.getElementById('history-area');
                const temp = document.createElement('div');
                temp.innerHTML = d.historyHtml;

                temp.querySelectorAll('.history-item').forEach(item => {
                    const title = item.querySelector('strong').innerText;
                    const acc = document.createElement('div');
                    acc.className = 'hist-acc';
                    
                    // Rebuild history table without icons and with tight columns
                    let originalTable = item.querySelector('table');
                    let newTable = `<table style="width: auto; margin-right: auto;"><tbody>`;
                    
                    originalTable.querySelectorAll('tr').forEach(tr => {
                        let cells = tr.querySelectorAll('td, th');
                        if (tr.innerText.includes("Division")) {
                            newTable += `<tr style="background:#f8fafc;"><td colspan="3" style="font-size:11px; font-weight:bold; color:#64748b; padding:8px 20px;">${tr.innerText.toUpperCase()}</td></tr>`;
                        } else if (cells.length === 3) {
                            newTable += `<tr>
                                <td style="padding-right:40px;">${cells[0].innerText}</td>
                                <td style="width:60px; text-align:center;" class="${getScoreClass(cells[1].innerText)}">${cells[1].innerText}</td>
                                <td style="width:60px; text-align:center; font-weight:bold;">${cells[2].innerText}</td>
                            </tr>`;
                        }
                    });
                    newTable += `</tbody></table>`;

                    acc.innerHTML = `
                        <div class="hist-header" onclick="this.nextElementSibling.classList.toggle('active')">
                            <span>${title}</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <div class="hist-content">${newTable}</div>`;
                    histArea.appendChild(acc);
                });
            }

        } catch (e) { console.error("Error loading data:", e); }
    }

    window.onload = loadData;
</script>

</body>
</html>
